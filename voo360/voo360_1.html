<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACE - Voo 360</title>
    <link rel="shortcut icon" href="../imagens/logo-space.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">
    <style>
        #bloco-ra {
            background:
                radial-gradient(ellipse 400px 250px at 70% 10%, rgba(0, 168, 79, 0.03) 0%, transparent 60%),
                linear-gradient(to bottom, #0a0a0a 0%, #111 50%, #141414 100%);
            position: relative;
            overflow: hidden;
        }
        #model-viewer-ra {
            background: transparent;
            --poster-color: transparent;
            position: relative;
            z-index: 1;
        }

        #motion-label {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            padding: 8px 22px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid var(--accent-dim, rgba(0,168,79,0.15));
            border-radius: 24px;
            color: var(--text, #f0ede8);
            font-family: var(--font-display, 'Syne', sans-serif);
            font-weight: 600;
            font-size: clamp(9pt, 1.3vw, 12pt);
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease, transform 0.35s ease;
            z-index: 3;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        #motion-label.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        #motion-label .axis-icon {
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
            animation: spin-arrow 2.5s linear infinite;
        }
        #motion-label .axis-icon path,
        #motion-label .axis-icon polyline {
            stroke: var(--accent, #00a84f);
        }
        @keyframes spin-arrow {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="tela">
        <div id="bloco-ra" style="overflow: hidden;">
            <h1 class="titulo-ra">CONTROLE DE UM AVIÃO</h1>

            <!-- Educational overlay shown during active motion -->
            <div id="motion-label" aria-live="polite">
                <svg class="axis-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffd54f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12a9 9 0 1 1-3.5-7.1"></path>
                    <polyline points="21 4 21 9 16 9"></polyline>
                </svg>
                <span id="motion-text">—</span>
            </div>

            <model-viewer
                id="model-viewer-ra"
                src="../modelos/voo360/aviao_anima.glb"
                camera-controls
                touch-action="pan-y"
                interaction-prompt="none"
                interpolation-decay="180"
                exposure="1.05"
                shadow-intensity="0.4"
                disable-zoom>
                <div class="progress-bar hide" slot="progress-bar"></div>
            </model-viewer>

            <div class="menu_animacao">
                <button class="botao_animacao" id="botao_animacao_arfagem"   nome-anim="Profundor_Arfagem">Arfagem</button>
                <button class="botao_animacao" id="botao_animacao_rolamento" nome-anim="AileronDireito_Rolamento">Rolamento</button>
                <button class="botao_animacao" id="botao_animacao_guinada"   nome-anim="Leme_Guinada">Guinada</button>
                <button class="botao_animacao" id="botao_parar" style="display:none;">Parar</button>
            </div>
        </div>

        <div class="menu_navegacao">
            <a href="../index.html" target="_self" rel="next">
                <button class="botao_menu_navegacao">VOLTAR</button>
            </a>
            <a href="../voo360/voo360_2.html" target="_self" rel="next">
                <button class="botao_menu_navegacao">PROSSEGUIR</button>
            </a>
        </div>
    </div>

    <!-- Google's model-viewer web component (same CDN as modelos_3d/* pages) -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <script>
        const mv = document.getElementById('model-viewer-ra');
        const buttons = document.querySelectorAll('.botao_animacao');
        const motionLabel = document.getElementById('motion-label');
        const motionText  = document.getElementById('motion-text');

        // -----------------------------------------------------------------
        // Motion config — angles & per-axis cameras
        // -----------------------------------------------------------------
        const CAMERA_DEFAULT = '32deg 78deg 4.5m';

        const MOTIONS = {
            'Profundor_Arfagem': {
                axis: 'pitch',
                peak: -22,
                camera: '90deg 88deg 4.5m',
                label: 'ARFAGEM — eixo lateral',
            },
            'AileronDireito_Rolamento': {
                // Sign FLIPPED — when right aileron deflects up, plane rolls right
                axis: 'roll',
                peak: -30,
                camera: '0deg 78deg 4.5m',
                label: 'ROLAMENTO — eixo longitudinal',
            },
            'Leme_Guinada': {
                axis: 'yaw',
                peak: 25,
                camera: '0deg 22deg 4.5m',
                label: 'GUINADA — eixo vertical',
            },
        };

        const IDLE = {
            roll:  { amp: 1.5, period: 9.0  },
            pitch: { amp: 1.0, period: 6.5  },
            yaw:   { amp: 0.6, period: 11.5 },
        };

        const T_CAM_LEAD_MS   = 500;
        const T_CAM_RETURN_MS = 500;
        const T_UNLOCK_MS     = 1100;

        // -----------------------------------------------------------------
        // State
        // -----------------------------------------------------------------
        let activeMotion = null;
        let leftAileron = null;
        let leftBaseQuat = null;
        let rightAileron = null;
        let rightBaseQuat = null;

        const startTime = performance.now();

        mv.cameraOrbit  = CAMERA_DEFAULT;
        mv.cameraTarget = '0m 0m 0m';
        mv.orientation  = '0deg 0deg 0deg';

        // -----------------------------------------------------------------
        // Discover aileron scene nodes after GLB loads.
        // The GLB animation "AileronDireito|Rolamento|Base Layer" only drives
        // the RIGHT aileron. We mirror its rotation onto the left aileron
        // each frame so both move in opposite directions (real roll behavior).
        // -----------------------------------------------------------------
        function getSceneRoot() {
            // Try mv.model first (model-viewer 4.x official API)
            if (mv.model && typeof mv.model.traverse === 'function') return mv.model;
            // Fallback: walk Symbols to find the Three.js scene
            const syms = Object.getOwnPropertySymbols(mv);
            for (const s of syms) {
                try {
                    const v = mv[s];
                    if (!v || typeof v !== 'object') continue;
                    if (typeof v.traverse === 'function') return v;
                    if (v.scene && typeof v.scene.traverse === 'function') return v.scene;
                    if (v.modelContainer && typeof v.modelContainer.traverse === 'function') return v.modelContainer;
                    // model-viewer 4.x often wraps in a "Scene" class
                    const keys = Object.getOwnPropertyNames(v);
                    for (const k of keys) {
                        const prop = v[k];
                        if (prop && typeof prop.traverse === 'function') return prop;
                    }
                    const innerSyms = Object.getOwnPropertySymbols(v);
                    for (const si of innerSyms) {
                        const iv = v[si];
                        if (iv && typeof iv.traverse === 'function') return iv;
                    }
                } catch(e) {}
            }
            return null;
        }

        function detectAilerons() {
            const root = getSceneRoot();
            if (!root) return false;

            root.traverse(n => {
                if (!n || !n.name) return;
                const lname = n.name.toLowerCase();
                if (!lname.includes('aileron')) return;

                if (lname.includes('dir') || lname.includes('right')) {
                    if (!rightAileron || !n.isMesh) {
                        rightAileron = n;
                        rightBaseQuat = n.quaternion.clone();
                    }
                } else if (lname.includes('esq') || lname.includes('left')) {
                    if (!leftAileron || !n.isMesh) {
                        leftAileron = n;
                        leftBaseQuat = n.quaternion.clone();
                    }
                }
            });

            return !!(rightAileron && leftAileron);
        }

        mv.addEventListener('load', () => {
            if (!detectAilerons()) {
                setTimeout(() => { if (!detectAilerons()) setTimeout(detectAilerons, 750); }, 300);
            }
        });

        function findAnimation(buttonName, available) {
            let hit = available.find(a => a === buttonName);
            if (hit) return hit;
            hit = available.find(a => a.toLowerCase() === buttonName.toLowerCase());
            if (hit) return hit;
            const tail = buttonName.split('_').pop();
            return available.find(a => a.toLowerCase().includes(tail.toLowerCase())) || null;
        }

        // Mirror right aileron rotation onto left (inverted delta = opposite direction)
        function mirrorRightToLeft() {
            if (!rightAileron || !leftAileron || !rightBaseQuat || !leftBaseQuat) return;
            const dQ = rightBaseQuat.clone().invert().multiply(rightAileron.quaternion);
            dQ.invert();
            leftAileron.quaternion.copy(leftBaseQuat).multiply(dQ);
        }

        function resetLeftAileron() {
            if (leftAileron && leftBaseQuat) {
                leftAileron.quaternion.copy(leftBaseQuat);
            }
        }

        const stopBtn = document.getElementById('botao_parar');
        const motionButtons = [...buttons].filter(b => b !== stopBtn);

        // While an animation plays, the three motion options vanish and only the
        // (centered) Stop button is shown — this also stops the menu from
        // occluding the plane on low-angle views like Guinada.
        function showStopOnly() {
            motionButtons.forEach(b => { b.style.display = 'none'; });
            stopBtn.style.display = '';
            stopBtn.disabled = false;
        }

        function showMotionMenu() {
            motionButtons.forEach(b => {
                b.style.display = '';
                b.disabled = false;
                b.classList.remove('ativo');
            });
            stopBtn.style.display = 'none';
        }

        function stopAnimation() {
            if (!activeMotion) return;
            mv.pause();
            mv.currentTime = 0;
            motionLabel.classList.remove('visible');
            if (activeMotion.axis === 'roll') resetLeftAileron();
            activeMotion.bodyDone = true;
            activeMotion = null;
            showMotionMenu();
            mv.cameraOrbit = CAMERA_DEFAULT;
        }

        stopBtn.addEventListener('click', stopAnimation);

        // -----------------------------------------------------------------
        // Render loop — drives body orientation (idle wobble + active motion).
        // Left aileron mirroring is handled in the 'before-render' event to
        // ensure it applies AFTER model-viewer's internal animation update.
        // -----------------------------------------------------------------
        function renderLoop(now) {
            const elapsedSec = (now - startTime) / 1000;

            const idleRoll  = IDLE.roll.amp  * Math.sin((2 * Math.PI / IDLE.roll.period)  * elapsedSec);
            const idlePitch = IDLE.pitch.amp * Math.sin((2 * Math.PI / IDLE.pitch.period) * elapsedSec + 1.3);
            const idleYaw   = IDLE.yaw.amp   * Math.sin((2 * Math.PI / IDLE.yaw.period)   * elapsedSec + 2.7);

            let r = idleRoll, p = idlePitch, y = idleYaw;

            if (activeMotion) {
                const dur = mv.duration || 0;
                const ct  = mv.currentTime || 0;
                const elapsedSinceStart = now - activeMotion.startedAt;
                const animStillPlaying = dur > 0 && ct < dur && elapsedSinceStart < (dur * 1000 + 250);

                if (!animStillPlaying && !activeMotion.bodyDone) {
                    activeMotion.bodyDone = true;
                    mv.pause();
                    mv.currentTime = 0;
                    motionLabel.classList.remove('visible');
                    if (activeMotion.axis === 'roll') resetLeftAileron();
                    setTimeout(() => { mv.cameraOrbit = CAMERA_DEFAULT; }, T_CAM_RETURN_MS);
                    setTimeout(() => {
                        showMotionMenu();
                        activeMotion = null;
                    }, T_UNLOCK_MS);
                } else if (animStillPlaying) {
                    const t = Math.max(0, Math.min(1, ct / dur));
                    const env = Math.sin(t * Math.PI);

                    const angle = activeMotion.peak * env;
                    if (activeMotion.axis === 'roll')  r += angle;
                    if (activeMotion.axis === 'pitch') p += angle;
                    if (activeMotion.axis === 'yaw')   y += angle;

                    if (activeMotion.axis === 'roll') mirrorRightToLeft();
                }
            }

            mv.orientation = `${r.toFixed(2)}deg ${p.toFixed(2)}deg ${y.toFixed(2)}deg`;
            requestAnimationFrame(renderLoop);
        }
        requestAnimationFrame(renderLoop);


        // -----------------------------------------------------------------
        // Button → motion trigger
        // -----------------------------------------------------------------
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (activeMotion) return;
                const animName = btn.getAttribute('nome-anim');
                const motion = MOTIONS[animName];
                if (!motion) return;

                showStopOnly();

                mv.cameraOrbit = motion.camera;
                motionText.textContent = motion.label;
                motionLabel.classList.add('visible');

                const available = mv.availableAnimations || [];

                setTimeout(() => {
                    const target = findAnimation(animName, available);
                    if (target) {
                        mv.animationName = target;
                        mv.currentTime = 0;
                        mv.play({ repetitions: 1 });
                    }
                    activeMotion = {
                        axis: motion.axis,
                        peak: motion.peak,
                        startedAt: performance.now(),
                        bodyDone: false,
                        btn,
                    };
                }, T_CAM_LEAD_MS);
            });
        });
    </script>
    <script src="../js/engine.js"></script>
</body>
</html>
