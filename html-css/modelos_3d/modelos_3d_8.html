<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACE - Modelos 3D</title>
    <link rel="shortcut icon" href="../imagens/logo-space.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">
    <style>
        
    </style>
</head>
<body>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <div id="tela">
        <div id="bloco-texto">
            <h1 class="titulo">NASA ORION</h1>
            <div id="bloco-modelo" style="overflow: hidden;">
                <model-viewer 
                src="../modelos/nasa_orion.glb"
                ios-src="../modelos/IOS/nasa_orion.usdz"
                auto-rotate
                auto-rotate-speed="-1" 
                interaction-prompt="none"
                disable-zoom
                camera-controls
                camera-orbit="-90deg 90deg"
                auto-rotate-delay=0
                exposure="0.25"
                shadow-intensity="0.5"
                rotation-per-second="15deg">
                    <div class="progress-bar hide" slot="progress-bar"></div>
                </model-viewer>
            </div>
            <p class="texto">A Orion é uma nave espacial projetada para longas viagens, seu primeiro teste foi concluído em 2014.</p>
        </div>
        <div class="menu_navegacao">
            <a href="../modelos_3d/modelos_3d_7.html" target="_self" rel="next">
                <button class="botao_menu_navegacao">VOLTAR</button>
            </a>
            <a href="../index.html" target="_self" rel="next">
                <button class="botao_menu_navegacao">MENU INICIAL</button>
            </a>
        </div>
    </div>
</div>
</body>
</html>
